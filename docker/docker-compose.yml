version: "3.9"

services:

  influxdb:

    image: influxdb:2.7

    container_name: dns-influxdb

    restart: unless-stopped

    ports:
      - "8086:8086"

    volumes:
      - influxdb-data:/var/lib/influxdb2

    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup

      DOCKER_INFLUXDB_INIT_USERNAME: admin

      DOCKER_INFLUXDB_INIT_PASSWORD: admin12345

      DOCKER_INFLUXDB_INIT_ORG: dns-observatory

      DOCKER_INFLUXDB_INIT_BUCKET: telemetry

      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: dns-observatory-token

  grafana:

    image: grafana/grafana:latest

    container_name: dns-grafana

    restart: unless-stopped

    ports:
      - "3000:3000"

    depends_on:
      - influxdb

    volumes:
      - grafana-data:/var/lib/grafana

volumes:

  influxdb-data:

  grafana-data: